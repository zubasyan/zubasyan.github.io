site_name: "頭刃叉"

site_description: blog

plugins:
  - search
  - blog:
      blog_toc: true
      archive_date_format: MMMM yyyy
      categories_allowed:
        - contest
        - study
        - other
      pagination_per_page: 10
nav:
  - Home: index.md
  - Blog:
    - blog/index.md

theme:
  name: material
  features:
    - navigation.indexes
